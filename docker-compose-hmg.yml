version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: goaluser
      POSTGRES_PASSWORD: goalpass
      POSTGRES_DB: goalgetterdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goaluser -d goalgetterdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
