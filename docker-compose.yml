services:
  backend:
    build: .
    ports:
      - "8881:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  db:
    image: postgres:15-alpine
    ports:
      - "5472:5432"
    environment:
      POSTGRES_USER: goaluser
      POSTGRES_PASSWORD: goalpass
      POSTGRES_DB: goalgetterdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U goaluser -d goalgetterdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
